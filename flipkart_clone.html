<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <style>
        body {margin:0;font-family:Arial,Helvetica,sans-serif;}
        header {background:#2874f0;color:#fff;padding:0 20px;display:flex;align-items:center;height:60px;}
        .logo {font-size:1.5rem;font-weight:bold;}
        .search {flex:1;display:flex;margin:0 20px;}
        .search input {flex:1;padding:6px 10px;border:none;border-radius:2px 0 0 2px;font-size:1rem;}
        .search button {padding:6px 12px;border:none;background:#fff;color:#2874f0;border-radius:0 2px 2px 0;cursor:pointer;}
        .nav {display:flex;gap:20px;}
        .nav a {color:#fff;text-decoration:none;font-size:0.9rem;display:flex;align-items:center;}
        .banner {padding:20px;display:flex;justify-content:center;gap:20px;overflow-x:auto;}
        .banner img{max-width:100%;height:auto;display:block;}
        .categories {padding:20px;display:flex;flex-wrap:wrap;gap:15px;justify-content:center;}
        .cat {width:120px;text-align:center;font-size:0.85rem;}
        .cat img{width:80px;height:80px;object-fit:contain;}
    </style>
</head>
<body>
    <header>
        <div class="logo">Flipkart</div>
        <div class="search">
            <input type="text" placeholder="Search for Products, Brands and More">
            <button>🔍</button>
        </div>
        <div class="nav">
            <a href="#">Login</a>
            <a href="#">More ▼</a>
            <a href="#">Cart</a>
        </div>
    </header>
    <section class="banner">
        <img src="https://via.placeholder.com/300x150?text=Banner+1" alt="Banner 1">
        <img src="https://via.placeholder.com/300x150?text=Banner+2" alt="Banner 2">
        <img src="https://via.placeholder.com/300x150?text=Banner+3" alt="Banner 3">
    </section>
    <section class="categories">
        <div class="cat"><img src="https://via.placeholder.com/80?text=Fashion"><br>Fashion</div>
        <div class="cat"><img src="https://via.placeholder.com/80?text=Travel"><br>Travel</div>
        <div class="cat"><img src="https://via.placeholder.com/80?text=Electronics"><br>Electronics</div>
        <div class="cat"><img src="https://via.placeholder.com/80?text=Home"><br>Home & Kitchen</div>
        <div class="cat"><img src="https://via.placeholder.com/80?text=Mobiles"><br>Mobiles</div>
        <div class="cat"><img src="https://via.placeholder.com/80?text=Food"><br>Food & Health</div>
        <div class="cat"><img src="https://via.placeholder.com/80?text=Appliances"><br>Appliances</div>
        <div class="cat"><img src="https://via.placeholder.com/80?text=Beauty"><br>Beauty</div>
    </section>
</body>
</html>
